<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline — AnamDev</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0A0E1A;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .wrap {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
      }
      .brand {
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
      }
      .brand .accent {
        color: #3B82F6;
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 14px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.55);
        margin: 0 0 24px;
      }
      button {
        background: linear-gradient(to right, #3B82F6, #F97316);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="brand">{<span>Anam</span><span class="accent">Dev</span>}</div>
        <h1>You're offline</h1>
        <p>This page needs an internet connection. Reconnect and try again.</p>
        <button onclick="location.reload()">Try again</button>
      </div>
    </div>
  </body>
</html>
